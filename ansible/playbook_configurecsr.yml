- name: Configuration des interfaces du CSR1000
  hosts: csr1000
  gather_facts: false

# Liste des tâches associées à notre Acte
  tasks:
    - name: Configuration de la couche 3 (IP)
        # On indique le nom du module
      cisco.ios.ios_l3_interfaces:
        # On indique ensuite les paramètres
        config:
          - name: GigabitEthernet1
            ipv4:
              - dhcp:
                  enable: true

          - name: GigabitEthernet2
            ipv4:
              - address: 192.168.2.1/24
            
          - name: GigabitEthernet3
            ipv4:
              - address: 192.168.3.1/24
                
          - name: GigabitEthernet4
            ipv4:
              - address: 192.168.4.1/24

    - name: Activation et descriptions des interfaces
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: "Interface WAN (DHCP)"
            enabled: true  
          - name: GigabitEthernet2
            description: "LAN Entreprise"
            enabled: true
          - name: GigabitEthernet3
            description: "LAN DMZ"
            enabled: true
          - name: GigabitEthernet4    
            description: "LAN Admin"
            enabled: true