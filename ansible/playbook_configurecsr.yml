- name: Configuration des interfaces du CSR1000
  hosts: csr1000
  gather_facts: false

# Liste des tâches associées à notre Acte
  tasks:
    - name: Configuration de la couche 3 (IP)
        # On indique le nom du module
      cisco.ios.ios_l3_interfaces:
        # On indique ensuite les paramètres
        config:
          - name: GigabitEthernet1
            ipv4:
              - dhcp:
                  enable: true

          - name: GigabitEthernet2
            ipv4:
              - address: 192.168.2.1/24
            
          - name: GigabitEthernet3
            ipv4:
              - address: 192.168.3.1/24
                
          - name: GigabitEthernet4
            ipv4:
              - address: 192.168.4.1/24

    - name: Activation et descriptions des interfaces
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: "Interface WAN (DHCP)"
            enabled: true  
          - name: GigabitEthernet2
            description: "LAN Entreprise"
            enabled: true
          - name: GigabitEthernet3
            description: "LAN DMZ"
            enabled: true
          - name: GigabitEthernet4    
            description: "LAN Admin"
            enabled: true
    

    - name: Suppression du pool DHCP existant 
      cisco.ios.ios_config:
        lines:
          - no ip dhcp pool POOL_ENTREPRISE

    - name: Création du nouveau pool DHCP
      cisco.ios.ios_config:
        # La commande parente qui ouvre le sous-menu 
        parents: ip dhcp pool POOL_ENTREPRISE
        lines:
          # Ici, on met les commandes EXACTES du terminal Cisco 
          - network 192.168.2.0 255.255.255.0
          - default-router 192.168.2.1
          - dns-server 8.8.8.8
    
    - name: Configuration du NAT Outside (Interface WAN)
      cisco.ios.ios_config:
        parents: "interface GigabitEthernet1"
        lines:
          - ip nat outside

    - name: Configuration du NAT Inside (Interfaces LAN) via une boucle
      cisco.ios.ios_config:
        parents: "interface {{ item }}"
        lines:
          - ip nat inside
      loop:
        # À toi de lister tes 3 interfaces "inside" ici !
        - GigabitEthernet2
        - GigabitEthernet3
        - GigabitEthernet4
        
    - name: Création de l'ACL 1 pour autoriser les réseaux internes
      cisco.ios.ios_config:
        lines:
          # {{ item }} sera remplacé par chaque adresse IP de la boucle
          - "access-list 1 permit {{ item }} 0.0.0.255"
      loop:
        - 192.168.2.0  # Le réseau LAN Entreprise
        #  du réseau LAN DMZ
        - 192.168.3.0
        #  réseau LAN Admin
        - 192.168.4.0

    - name: Activation globale du PAT (Surcharge NAT)
      cisco.ios.ios_config:
        lines:
          # La commande qui lie l'ACL 1 à l'interface WAN G1
          - ip nat inside source list 1 interface GigabitEthernet1 overload

    - name: Configuration du PAT par port (Port Forwarding)
      cisco.ios.ios_config:
        lines:
          # Redirection pour le Serveur Web (Port 80 -> Port 80)
         - ip nat inside source static tcp 192.168.3.2 80 interface GigabitEthernet1 80
          
          # Redirection pour le Serveur SSH Admin (Port 2222 -> Port 22)
         - ip nat inside source static tcp 192.168.4.2 2222 interface GigabitEthernet1 22 